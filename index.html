<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카카오페이</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
}
.top {
  background: #ffeb00;
  padding: 30px;
  font-size: 24px;
  font-weight: bold;
}
.card {
  padding: 20px;
}
.button {
  margin-top: 20px;
  padding: 15px;
  background: #eee;
  text-align: center;
  border-radius: 10px;
  font-size: 18px;
}
</style>
</head>
<body> 

<div class="top">송금보내요</div> 

<div class="card">
  <h2>1,000,000원을 보냈어요.</h2>
  <p>송금 받기 전까지 취소할 수 있어요.</p> 

  <div class="button" onclick="goLink()">송금 받기</div>
</div> 

<script>
function goLink() {
  location.href = "https://sites.google.com/view/trickaprilfools-day/%EC%A7%9C%EC%9E%90%EC%9E%94"; // 여기 바꾸면 됨
}
</script> 

</body>
</html>
